version: 1

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin

archives:
  - format: tar.gz
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"
snapshot:
  name_template: "{{ incpatch .Version }}-next"
changelog:
  # release-please owns the changelog text on the GitHub Release.
  # Disable goreleaser's auto-changelog so the two don't fight.
  disable: true
release:
  prerelease: auto
  # release-please creates the GitHub Release when its release PR is merged.
  # `append` tells goreleaser to upload binaries to that existing release
  # rather than fail because the tag already has one.
  mode: append

universal_binaries:
  - replace: true
brews:
  - name: degit
    description: A Go port of the node degit CLI https://github.com/rich-harris/degit. Download remote repositories without git history. Supports specifying subdirectory, branch and commit hash.
    homepage: https://github.com/qiushiyan/degit
    # Without this, goreleaser v1 writes the formula at the tap repo root,
    # where `brew tap qiushiyan/tap` cannot find it (Homebrew expects
    # Formula/<name>.rb).
    directory: Formula
    repository:
      owner: qiushiyan
      name: homebrew-tap
      branch: main
    commit_author:
      name: qiushiyan
      email: qiushi.yann@gmail.com
